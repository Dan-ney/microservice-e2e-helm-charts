replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  host: ""

env: []

envFromSecret: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70

serviceAccount:
  create: true
  name: ""

livenessProbe:
  enabled: false
  path: /health
  port: 8080

readinessProbe:
  enabled: false
  path: /health
  port: 8080
